<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title></title>
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    <br />
    <h2>Choose</h2>
    <button id="rockBtn" type="button">
      <i class="fa-solid fa-circle"></i>Rock
    </button>

    <button id="paperBtn" type="button">
      <i class="fa-regular fa-file"></i>Paper
    </button>

    <button id="scissorBtn" type="button">
      <i class="fa-solid fa-scissors"></i>Scissors
    </button>
    <br />
    <h2 id="botChoice">Bot choice</h2>
    <h2 id="Result">Result</h2>
  </body>
  <script src="RockPaperScissors.js"></script>
</html>
