<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Rock Paper Scissors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="gameArea">
      <div class="topBar">
        <div class="score">
          <div class="scoreCard">
            <div id="userScore" class="scoreValue"><b>You</b></div>
            <div class="scoreLine"></div>
            <div id="botScore" class="scoreValue"><b>Bot</b></div>
          </div>
        </div>
        <div class="cheats">
          <div class="concaveBorder"></div>
          <div class="cheatsArea">
            <div class="cheatsTop">
              <h2>Cheats</h2>
              <div id="cheatsBtn" class="cheatsBtn">
                <div id="cheatsSlider" class="slider"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="core">
        <div class="coreCard">
          <h3 id="botThinking" class="botThinking">Bot is thinking</h3>
          <div class="bottomText">
            <h1 id="userChoice">Play</h1>
            <div id="gameResult" class="gameState">Choose the options below</div>
          </div>
        </div>
      </div>

      <div class="optionCard">
        <div id="rockBtn" class="optionBtn">
          <div class="optionItems">🪨</div>
        </div>
        <div id="paperBtn" class="optionBtn">
          <div class="optionItems">📄</div>
        </div>
        <div id="scissorBtn" class="optionBtn">
          <div class="optionItems">✂️</div>
        </div>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
