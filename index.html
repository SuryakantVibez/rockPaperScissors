<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Rock Paper Scissors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="gamearea">
      <div class="topArea">
        <div class="score">
          <div class="scoreCard">
            <div class="scoreValue"><b>You</b></div>
            <div class="scoreLine"></div>
            <div class="scoreValue"><b>Bot</b></div>
          </div>
        </div>

        <div class="core">
          <div class="coreCard"></div>
        </div>
      </div>
      <div class="optionCard">
        <div class="optionBtn">Rock</div>
        <div class="optionBtn">Paper</div>
        <div class="optionBtn">Scissors</div>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
